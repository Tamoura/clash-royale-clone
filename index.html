<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clash Royale Clone</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1b2433;
        font-family: "Trebuchet MS", system-ui, sans-serif;
        user-select: none;
        overflow: hidden;
      }
      #app {
        height: 100%;
        display: flex;
        flex-direction: column;
        max-width: 760px;
        margin: 0 auto;
      }
      #topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 14px;
        color: #e5e7eb;
        background: #141a26;
      }
      #topbar .clock {
        font-weight: bold;
        font-size: 20px;
        flex: 1;
        text-align: center;
      }
      #topbar .clock.overtime {
        color: #f87171;
      }
      #topbar .crowns {
        font-size: 16px;
        font-weight: bold;
      }
      #topbar .crowns.player span {
        color: #3b82f6;
      }
      #topbar .crowns.enemy span {
        color: #ef4444;
      }
      #topbar .mute {
        background: #273449;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        padding: 6px 10px;
        cursor: pointer;
      }
      #stage {
        flex: 1;
        position: relative;
        min-height: 0;
      }
      #stage canvas {
        position: absolute;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
        cursor: crosshair;
      }
      #hud {
        background: #141a26;
        padding: 8px 14px 12px;
      }
      .elixir-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }
      .elixir-bar {
        flex: 1;
        height: 14px;
        background: #0b0f17;
        border-radius: 7px;
        overflow: hidden;
      }
      .elixir-fill {
        height: 100%;
        background: linear-gradient(90deg, #a21caf, #d946ef);
        border-radius: 7px;
        transition: width 0.15s linear;
      }
      .elixir-num {
        color: #f0abfc;
        font-weight: bold;
        width: 22px;
        text-align: center;
        font-size: 16px;
      }
      .hand-row {
        display: flex;
        gap: 10px;
        align-items: stretch;
        justify-content: center;
      }
      .next-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        opacity: 0.75;
      }
      .next-art canvas {
        width: 40px;
        height: 40px;
        background: #1f2937;
        border-radius: 6px;
      }
      .next-label {
        color: #9ca3af;
        font-size: 10px;
      }
      button.card {
        position: relative;
        width: 86px;
        border: 2px solid transparent;
        border-radius: 10px;
        background: #273449;
        color: #fff;
        cursor: pointer;
        padding: 6px 4px 14px;
        transition: transform 0.08s ease;
      }
      button.card:hover {
        transform: translateY(-3px);
      }
      button.card.selected {
        background: #3b5bdb;
        border-color: #93c5fd;
      }
      button.card.locked {
        opacity: 0.45;
      }
      button.card canvas {
        width: 56px;
        height: 56px;
      }
      .card-name {
        font-size: 11px;
        font-weight: bold;
      }
      .card-cost {
        position: absolute;
        left: 50%;
        bottom: -10px;
        transform: translateX(-50%);
        background: #c026d3;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        line-height: 20px;
        font-size: 12px;
        font-weight: bold;
      }
      #banner {
        position: absolute;
        top: 34%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 46px;
        font-weight: bold;
        color: #facc15;
        text-shadow:
          0 0 18px rgba(0, 0, 0, 0.9),
          0 3px 0 rgba(0, 0, 0, 0.6);
        pointer-events: none;
        opacity: 0;
        z-index: 5;
      }
      #banner.show {
        animation: bannerPop 1.6s ease-out forwards;
      }
      #banner.countdown {
        font-size: 86px;
      }
      @keyframes bannerPop {
        0% {
          opacity: 0;
          transform: scale(0.3);
        }
        12% {
          opacity: 1;
          transform: scale(1.15);
        }
        20% {
          transform: scale(1);
        }
        78% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(1.05) translateY(-14px);
        }
      }
      .emote-bar {
        position: absolute;
        right: 8px;
        bottom: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        z-index: 4;
      }
      .emote-bar button {
        width: 40px;
        height: 40px;
        font-size: 22px;
        border: none;
        border-radius: 50%;
        background: rgba(20, 26, 38, 0.75);
        cursor: pointer;
        transition: transform 0.08s ease;
      }
      .emote-bar button:hover {
        transform: scale(1.18);
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: rgba(10, 14, 22, 0.8);
        z-index: 10;
      }
      #overlay.show {
        display: flex;
      }
      .overlay-title {
        font-size: 54px;
        font-weight: bold;
        color: #e5e7eb;
      }
      .overlay-title[data-kind="player"] {
        color: #facc15;
      }
      .overlay-title[data-kind="enemy"] {
        color: #f87171;
      }
      .overlay-score {
        font-size: 28px;
        color: #e5e7eb;
      }
      #overlay .again {
        font-size: 20px;
        font-weight: bold;
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 28px;
        cursor: pointer;
      }
      #overlay .again:hover {
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topbar"></div>
      <div id="stage">
        <div id="banner"></div>
        <div class="emote-bar" id="emotes"></div>
      </div>
      <div id="hud"></div>
    </div>
    <div id="overlay"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
